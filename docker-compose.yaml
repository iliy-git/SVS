version: '3.8'
services:
  app:
    build:
      context: .
      args:
        - USER_ID=${UID:-1000}
        - GROUP_ID=${GID:-1000}
    container_name: vpn-admin-dev
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - .:/var/www
    environment:
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/database/database.sqlite
    networks:
      - vpn-net
  nginx:
    image: nginx:alpine
    container_name: vpn-admin-nginx
    ports:
      - "${ADMIN_HTTP_PORT:-8002}:80"
      - "${ADMIN_PORT:-8001}:443"
    volumes:
      - .:/var/www
      - ./docker-nginx.conf:/etc/nginx/conf.d/default.conf
      - ./certs/fullchain.pem:/etc/letsencrypt/live/subfastspeedvps.work.gd/fullchain.pem:ro
      - ./certs/privkey.pem:/etc/letsencrypt/live/subfastspeedvps.work.gd/privkey.pem:ro
      
    depends_on:
      - app
    networks:
      - vpn-net

networks:
  vpn-net:
    driver: bridge
